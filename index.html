<script type="module">
// Firebase imports
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, collection,
         addDoc, getDocs, deleteDoc, onSnapshot, query, orderBy, serverTimestamp,
         where, increment, arrayUnion, arrayRemove }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ORIGINAL WORKING FIREBASE CONFIGURATION
const firebaseConfig = {
  apiKey: "AIzaSyBg8om9AP7dase-Zoc8OeojfP8kQI5qtho",
  authDomain: "ub-academic-hub.firebaseapp.com",
  projectId: "ub-academic-hub",
  storageBucket: "ub-academic-hub.firebasestorage.app",
  messagingSenderId: "972839460503",
  appId: "1:972839460503:web:34b8d9d99da370239f13d2"
};

const _app = initializeApp(firebaseConfig);
const _db  = getFirestore(_app);

// Firestore helpers
const FS = {
  async getUser(id){ const s=await getDoc(doc(_db,'users',id)); return s.exists()?s.data():null; },
  async setUser(id,data){ await setDoc(doc(_db,'users',id),data,{merge:true}); },
  async addRequest(data){ return await addDoc(collection(_db,'requests'),{...data,at:serverTimestamp()}); },
  async deleteRequest(id){ await deleteDoc(doc(_db,'requests',id)); },
  async updateRequest(id,data){ await updateDoc(doc(_db,'requests',id),data); },
  onRequests(cb){ return onSnapshot(query(collection(_db,'requests'),orderBy('at','desc')),s=>cb(s.docs.map(d=>({id:d.id,...d.data()})))); },
  async getRatings(){ const s=await getDocs(collection(_db,'ratings')); const r={}; s.docs.forEach(d=>r[d.id]=d.data().list||[]); return r; },
  async addRating(tutorId,rating){ const ref=doc(_db,'ratings',tutorId); const s=await getDoc(ref); const list=s.exists()?(s.data().list||[]):[];list.push(rating);await setDoc(ref,{list}); },
  async addSession(data){ return await addDoc(collection(_db,'sessions'),{...data,at:serverTimestamp()}); },
  async deleteSession(id){ await deleteDoc(doc(_db,'sessions',id)); },
  async updateSession(id,data){ await updateDoc(doc(_db,'sessions',id),data); },
  onSessions(cb){ return onSnapshot(query(collection(_db,'sessions'),orderBy('at','desc')),s=>cb(s.docs.map(d=>({id:d.id,...d.data()})))); },
  async getAllUsers(){ const s=await getDocs(collection(_db,'users')); const r={}; s.docs.forEach(d=>r[d.id]=d.data()); return r; },
  async addPoint(data){ return await addDoc(collection(_db,'points'),{...data,at:serverTimestamp()}); },
  async getPoints(){ const s=await getDocs(query(collection(_db,'points'),orderBy('at','desc'))); return s.docs.map(d=>({id:d.id,...d.data()})); },
  onPoints(cb){ return onSnapshot(query(collection(_db,'points'),orderBy('at','desc')),s=>cb(s.docs.map(d=>({id:d.id,...d.data()})))); },
  async sendMsg(sessionId,data){ return await addDoc(collection(_db,'chats',sessionId,'messages'),{...data,at:serverTimestamp()}); },
  onMsgs(sessionId,cb){ return onSnapshot(query(collection(_db,'chats',sessionId,'messages'),orderBy('at','asc')),s=>cb(s.docs.map(d=>({id:d.id,...d.data()})))); },
  async addStudySession(data){ return await addDoc(collection(_db,'studySessions'),{...data,at:serverTimestamp()}); },
  async getUserStudySessions(userId){ const s=await getDocs(query(collection(_db,'studySessions'),where('userId','==',userId),orderBy('date','desc'))); return s.docs.map(d=>({id:d.id,...d.data()})); },
  async addNotification(userId,data){ await addDoc(collection(_db,'notifications'),{userId,...data,at:serverTimestamp(),read:false}); },
  async getNotifications(userId){ const s=await getDocs(query(collection(_db,'notifications'),where('userId','==',userId),orderBy('at','desc'),limit(20))); return s.docs.map(d=>({id:d.id,...d.data()})); },
  async addGroup(data){ return await addDoc(collection(_db,'groups'),{...data,at:serverTimestamp(),members:[data.createdBy]}); },
  async getGroups(){ const s=await getDocs(query(collection(_db,'groups'),orderBy('at','desc'))); return s.docs.map(d=>({id:d.id,...d.data()})); },
  onGroups(cb){ return onSnapshot(query(collection(_db,'groups'),orderBy('at','desc')),s=>cb(s.docs.map(d=>({id:d.id,...d.data()})))); },
  async joinGroup(groupId,userId){ await updateDoc(doc(_db,'groups',groupId),{members:arrayUnion(userId)}); },
  async leaveGroup(groupId,userId){ await updateDoc(doc(_db,'groups',groupId),{members:arrayRemove(userId)}); },
  async deleteGroup(groupId){ await deleteDoc(doc(_db,'groups',groupId)); },
  async sendGroupMsg(groupId,data){ return await addDoc(collection(_db,'groupChats',groupId,'messages'),{...data,at:serverTimestamp()}); },
  onGroupMsgs(groupId,cb){ return onSnapshot(query(collection(_db,'groupChats',groupId,'messages'),orderBy('at','asc')),s=>cb(s.docs.map(d=>({id:d.id,...d.data()})))); },
  async addStudySessionPost(data){ return await addDoc(collection(_db,'studySessionsPosts'),{...data,at:serverTimestamp()}); },
  async deleteStudySessionPost(id){ await deleteDoc(doc(_db,'studySessionsPosts',id)); },
  async updateStudySessionPost(id,data){ await updateDoc(doc(_db,'studySessionsPosts',id),data); },
  onStudySessionsPosts(cb){ return onSnapshot(query(collection(_db,'studySessionsPosts'),orderBy('dateTime','asc')),s=>cb(s.docs.map(d=>({id:d.id,...d.data()})))); },
  async addFocusRoom(data){ return await addDoc(collection(_db,'focusRooms'),{...data,at:serverTimestamp(),participants:[data.createdBy]}); },
  async deleteFocusRoom(id){ await deleteDoc(doc(_db,'focusRooms',id)); },
  async updateFocusRoom(id,data){ await updateDoc(doc(_db,'focusRooms',id),data); },
  onFocusRooms(cb){ return onSnapshot(query(collection(_db,'focusRooms'),orderBy('created','desc')),s=>cb(s.docs.map(d=>({id:d.id,...d.data()})))); },
  async joinFocusRoom(roomId,userId){ await updateDoc(doc(_db,'focusRooms',roomId),{participants:arrayUnion(userId)}); },
  async leaveFocusRoom(roomId,userId){ await updateDoc(doc(_db,'focusRooms',roomId),{participants:arrayRemove(userId)}); },
  async updateRoomTimer(roomId,timerData){ await updateDoc(doc(_db,'focusRooms',roomId),timerData); },
};

window.FS = FS;
window._fsReady = true;
document.dispatchEvent(new CustomEvent('fs-ready'));
console.log('✅ Firebase initialized with ORIGINAL working config');
</script>
