<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>UB Academic Hub</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/mobile.css">
    <link rel="stylesheet" href="css/themes.css">
</head>
<body>
    <!-- Particles Background -->
    <div id="particles"></div>
    
    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Auth Screen -->
    <div id="authScreen">
        <div class="auth-blob" style="width:400px;height:400px;background:rgba(124,58,237,.4);top:-100px;right:-100px;"></div>
        <div class="auth-blob" style="width:300px;height:300px;background:rgba(236,72,153,.3);bottom:-80px;left:-80px;animation-delay:-3s;"></div>
        <div class="auth-card">
            <div class="auth-brand">
                <div class="auth-logo">UB</div>
                <div class="auth-brand-text">
                    <strong>Academic Hub</strong>
                    <small>University of Botswana</small>
                </div>
            </div>
            <div class="auth-tabs">
                <button class="auth-tab on" id="authLoginTab">Sign In</button>
                <button class="auth-tab" id="authRegisterTab">Register</button>
            </div>
            <div id="loginF">
                <div class="ff">
                    <label>Student ID</label>
                    <input id="lU" type="text" inputmode="numeric" maxlength="9" placeholder="9-digit Student ID" autocomplete="username">
                </div>
                <div class="ff">
                    <label>Password</label>
                    <input id="lP" type="password" placeholder="Your password">
                </div>
                <div class="ff" style="margin-bottom:8px;">
                    <label style="display:flex;align-items:center;gap:5px;">
                        <input type="checkbox" id="rememberMe"> Remember me
                    </label>
                </div>
                <button class="btn-auth" onclick="window.doLogin()"><span>Sign In →</span></button>
                <p style="text-align:center;margin-top:12px;">
                    <a href="#" onclick="window.showForgotPassword()" style="color:var(--blue2);font-size:.8rem;">Forgot Password?</a>
                </p>
            </div>
            <div id="regF" class="hidden">
                <div class="ff"><label>Full Name</label><input id="rN" placeholder="e.g. Allen Mosimanegape"></div>
                <div class="ff"><label>Student ID <span style="font-weight:400;color:var(--muted);">(9 digits)</span></label><input id="rU" type="text" inputmode="numeric" maxlength="9" placeholder="e.g. 201901234"></div>
                <div class="ff"><label>WhatsApp Number</label><input id="rW" type="tel" placeholder="e.g. 267 71234567"></div>
                <div class="ff"><label>Email (optional)</label><input id="rE" type="email" placeholder="e.g. name@example.com"></div>
                <div class="ff"><label>Faculty</label>
                    <select id="rFac">
                        <option value="Engineering & Technology">Engineering & Technology</option>
                        <option value="Science">Science</option>
                        <option value="Business">Business</option>
                        <option value="Social Sciences">Social Sciences</option>
                        <option value="Humanities">Humanities</option>
                        <option value="Education">Education</option>
                        <option value="Law">Law</option>
                        <option value="Medicine">Medicine</option>
                    </select>
                </div>
                <div class="ff"><label>Year of Study</label>
                    <select id="rY">
                        <option>1st Year</option>
                        <option>2nd Year</option>
                        <option>3rd Year</option>
                        <option>4th Year</option>
                        <option>5th Year</option>
                    </select>
                </div>
                <div class="ff"><label>Password</label><input id="rP" type="password" placeholder="Choose a password"></div>
                <div class="ff"><label>Confirm Password</label><input id="rPC" type="password" placeholder="Confirm password"></div>
                <button class="btn-auth" onclick="window.doRegister()"><span>Create Account →</span></button>
            </div>
            <p class="auth-msg" id="aMsg"></p>
        </div>
    </div>

    <!-- App Screen -->
    <div id="appScreen" class="hidden">
        <div class="sidebar-overlay" id="sbOverlay" onclick="window.closeSidebar()"></div>
        
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="sb-logo" style="justify-content:space-between;">
                    <div style="display:flex;align-items:center;gap:12px;">
                        <div class="sb-badge">UB</div>
                        <div>
                            <div class="sb-title">Academic Hub</div>
                            <div class="sb-sub">University of Botswana</div>
                        </div>
                    </div>
                    <button onclick="window.toggleSidebar()" id="sbToggleBtn" title="Collapse sidebar"
                        style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.7);
                        width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:1rem;display:flex;align-items:center;
                        justify-content:center;flex-shrink:0;transition:all .2s;">◀</button>
                </div>
            </div>
            <div class="sidebar-user">
                <div class="sb-av" id="sbAv">A</div>
                <div class="sb-uinfo">
                    <div class="sb-uname" id="sbUname">—</div>
                    <span class="sb-role student" id="sbRole">Student</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-label">Dashboard</div>
                    <button class="nav-item on" onclick="window.go('home')" id="ni-home"><span class="ni">🏠</span><span>Home</span></button>
                </div>
                <div class="nav-section">
                    <div class="nav-section-label">📚 Academic Tools</div>
                    <button class="nav-item" onclick="window.go('gpa')" id="ni-gpa"><span class="ni">📊</span><span>GPA Tracker</span></button>
                    <button class="nav-item" onclick="window.go('study')" id="ni-study"><span class="ni">🎓</span><span>Study Hub</span></button>
                    <button class="nav-item" onclick="window.go('streak')" id="ni-streak"><span class="ni">🔥</span><span>Study Streak</span></button>
                </div>
                <div class="nav-section">
                    <div class="nav-section-label">🤝 PeerBridge</div>
                    <button class="nav-item" onclick="window.go('peer')" id="ni-peer"><span class="ni">🙋</span><span>Get Help</span></button>
                    <button class="nav-item" onclick="window.go('tutors')" id="ni-tutors"><span class="ni">⭐</span><span>Find a Tutor</span></button>
                    <button class="nav-item" onclick="window.go('become')" id="ni-become"><span class="ni">🎯</span><span>Become a Tutor</span></button>
                </div>
                <div class="nav-section">
                    <div class="nav-section-label">👥 Community</div>
                    <button class="nav-item" onclick="window.go('squad')" id="ni-squad"><span class="ni">📅</span><span>Study Squad</span></button>
                    <button class="nav-item" onclick="window.go('rooms')" id="ni-rooms"><span class="ni">👥</span><span>Focus Rooms</span></button>
                    <button class="nav-item" onclick="window.go('points')" id="ni-points"><span class="ni">⭐</span><span>Earn Points</span></button>
                </div>
                <div class="nav-section">
                    <div class="nav-section-label">Account</div>
                    <button class="nav-item" onclick="window.go('profile')" id="ni-profile"><span class="ni">👤</span><span>My Profile</span></button>
                    <button class="nav-item" onclick="window.go('settings')" id="ni-settings"><span class="ni">⚙️</span><span>Settings</span></button>
                </div>
            </nav>
            <div class="sidebar-footer">
                <button class="btn-logout" onclick="window.doLogout()">← Sign Out</button>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="main">
            <div class="topbar">
                <button class="topbar-menu" onclick="window.openSidebar()">☰</button>
                <span class="topbar-title" id="topTitle">Home</span>
                <div class="topbar-av" id="topAv">A</div>
            </div>
            
            <!-- Desktop "open sidebar" button -->
            <button id="sidebarOpenBtn" onclick="window.toggleSidebar()" title="Open sidebar"
                style="display:none;position:fixed;left:16px;top:16px;z-index:48;
                width:42px;height:42px;border-radius:12px;
                background:linear-gradient(135deg,#0f172a,#1e1b4b);
                border:1px solid rgba(255,255,255,.15);color:#fff;
                font-size:1.1rem;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.4);
                align-items:center;justify-content:center;transition:all .2s;">▶</button>

            <!-- Pages Container -->
            <div id="pages-container"></div>
        </div>
    </div>

    <!-- Modal Templates Container -->
    <div id="modal-container"></div>

    <!-- Scripts - Load in correct order -->
    <script src="js/firebase-config.js" type="module"></script>
    <script src="js/components/utils.js" type="module"></script>
    <script src="js/components/toast.js" type="module"></script>
    <script src="js/auth.js" type="module"></script>
    <script src="js/pages/home.js" type="module"></script>
    <script src="js/pages/gpa.js" type="module"></script>
    <script src="js/pages/study.js" type="module"></script>
    <script src="js/pages/streak.js" type="module"></script>
    <script src="js/pages/peer.js" type="module"></script>
    <script src="js/pages/tutors.js" type="module"></script>
    <script src="js/pages/squad.js" type="module"></script>
    <script src="js/pages/rooms.js" type="module"></script>
    <script src="js/pages/points.js" type="module"></script>
    <script src="js/pages/profile.js" type="module"></script>
    <script src="js/app.js" type="module"></script>

    <!-- Simple verification script -->
    <script>
        console.log('🔍 Checking if everything loaded:');
        
        setTimeout(() => {
            console.log('  - Firebase:', window.FS ? '✅' : '❌');
            console.log('  - doLogin:', typeof window.doLogin === 'function' ? '✅' : '❌');
            console.log('  - doRegister:', typeof window.doRegister === 'function' ? '✅' : '❌');
            console.log('  - go function:', typeof window.go === 'function' ? '✅' : '❌');
            
            if (!window.FS) {
                console.error('❌ Firebase not loaded! Check firebase-config.js');
            }
            if (typeof window.doLogin !== 'function') {
                console.error('❌ Auth functions not loaded! Check auth.js');
            }
        }, 2000);
    </script>
</body>
</html>
